<!DOCTYPE html>
<html lang="nb">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Plus One</title>
<meta name="description" content="Én rep mer for hver dag." />
<meta name="theme-color" content="#16140F" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Plus One" />
<link rel="apple-touch-icon" href="./icon.png" />
<link rel="icon" href="./icon.png" />
<link rel="manifest" href="./manifest.json" />
<style>
@import url('https://fonts.googleapis.com/css2?family=Archivo:wght@500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap');
:root{
  --bg-top:#16140F; --bg-bot:#100E0A;
  --surface:#211C15; --surface-2:#1A1610; --border:#2E2820; --border-hi:#433A2D;
  --text:#F4EFE6; --muted:#A89E8E; --dim:#6E665A;
  --green:#34D17E; --green-ink:#07140C; --green-tint:rgba(52,209,126,.10); --green-border:rgba(52,209,126,.40);
  --amber:#F2A93C; --amber-tint:rgba(242,169,60,.12); --amber-border:rgba(242,169,60,.42);
  --font-display:'Archivo', system-ui, -apple-system, 'Segoe UI', sans-serif;
  --font-body:'Inter', system-ui, -apple-system, 'Segoe UI', sans-serif;
}
*{box-sizing:border-box;}
html{background:var(--bg-top);}
body{margin:0;background:var(--bg-bot);}
#app{
  min-height:100vh; min-height:100dvh;
  background:linear-gradient(180deg,var(--bg-top),var(--bg-bot));
  background-attachment:fixed; color:var(--text);
  font-family:var(--font-body); -webkit-font-smoothing:antialiased;
  padding-top:calc(22px + env(safe-area-inset-top));
  padding-bottom:calc(40px + env(safe-area-inset-bottom));
  padding-left:calc(16px + env(safe-area-inset-left));
  padding-right:calc(16px + env(safe-area-inset-right));
}
.tc-wrap{max-width:480px;margin:0 auto;}

.tc-head{margin:6px 2px 18px;}
.tc-brand{display:flex;align-items:center;gap:9px;}
.tc-mark{display:grid;place-items:center;width:30px;height:30px;border-radius:9px;background:var(--amber-tint);color:var(--amber);}
.tc-wordmark{font-family:var(--font-display);font-weight:800;font-size:21px;letter-spacing:.06em;text-transform:uppercase;}
.tc-tag{margin:8px 0 0;color:var(--muted);font-size:13.5px;}

.tc-active{position:relative;background:var(--surface);border:1px solid var(--border);border-radius:22px;padding:22px 20px 20px;box-shadow:0 18px 40px -28px rgba(0,0,0,.9);animation:tcRise .4s ease both;overflow:hidden;}
.tc-active::before{content:"";position:absolute;left:0;right:0;top:0;height:3px;background:var(--amber);opacity:.9;}
.tc-active.is-celebrating{border-color:var(--green-border);background:linear-gradient(180deg,var(--green-tint),transparent),var(--surface);}
.tc-active.is-celebrating::before{background:var(--green);}
.tc-pill{display:inline-block;font-size:11px;font-weight:700;letter-spacing:.16em;text-transform:uppercase;color:var(--amber);background:var(--amber-tint);border:1px solid var(--amber-border);padding:4px 10px;border-radius:999px;}
.is-celebrating .tc-pill{color:var(--green);background:var(--green-tint);border-color:var(--green-border);}
.tc-daylabel{font-family:var(--font-display);font-weight:700;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:var(--dim);margin-top:14px;}
.tc-daynum{font-family:var(--font-display);font-weight:900;font-size:clamp(48px,15vw,68px);line-height:.92;letter-spacing:-.03em;margin-top:2px;font-variant-numeric:tabular-nums;}
.is-celebrating .tc-daynum{color:var(--green);}
.tc-daysub{margin:8px 0 0;color:var(--muted);font-size:14.5px;font-weight:500;}
.tc-progress{margin-top:14px;font-size:12.5px;font-weight:600;letter-spacing:.05em;color:var(--muted);text-transform:uppercase;}
.tc-progress.done{color:var(--green);}

.tc-buttons{display:flex;flex-direction:column;gap:10px;margin-top:14px;}
.tc-ex{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;min-height:62px;padding:0 16px;border-radius:15px;background:var(--surface-2);border:1.5px solid var(--border);color:var(--text);font-family:var(--font-body);cursor:pointer;transition:transform .16s ease,background .18s ease,border-color .18s ease,color .18s ease;-webkit-tap-highlight-color:transparent;text-align:left;}
.tc-ex:hover{border-color:var(--border-hi);}
.tc-ex:active{transform:scale(.975);}
.tc-ex:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
.tc-ex-left{display:flex;align-items:center;gap:12px;}
.tc-ex-icon{display:grid;place-items:center;color:var(--muted);flex:none;}
.tc-ex-name{font-weight:600;font-size:15.5px;}
.tc-ex-right{display:flex;align-items:center;gap:12px;}
.tc-ex-reps{font-family:var(--font-display);font-weight:800;font-size:20px;color:var(--muted);font-variant-numeric:tabular-nums;}
.tc-ex-state{width:26px;height:26px;border-radius:999px;border:2px solid #4A4234;display:grid;place-items:center;color:transparent;flex:none;transition:background .18s ease,border-color .18s ease,color .18s ease;}
.tc-ex.is-done{background:var(--green);border-color:var(--green);color:var(--green-ink);animation:tcPop .26s ease;}
.tc-ex.is-done .tc-ex-icon,.tc-ex.is-done .tc-ex-name,.tc-ex.is-done .tc-ex-reps{color:var(--green-ink);}
.tc-ex.is-done .tc-ex-state{background:rgba(7,20,12,.18);border-color:var(--green-ink);color:var(--green-ink);}

.tc-banner{display:flex;align-items:center;gap:11px;margin-top:14px;padding:12px 14px;border-radius:14px;background:var(--green-tint);border:1px solid var(--green-border);color:var(--green);animation:tcRise .32s ease both;}
.tc-banner-txt strong{display:block;font-family:var(--font-display);font-weight:800;font-size:15px;color:var(--text);}
.tc-banner-txt span{display:block;font-size:12.5px;color:var(--muted);margin-top:1px;}
.tc-banner svg{flex:none;}
.tc-undo{margin-left:auto;flex:none;background:transparent;border:1px solid var(--green-border);color:var(--green);font-family:var(--font-body);font-weight:600;font-size:12.5px;padding:7px 12px;border-radius:9px;cursor:pointer;}
.tc-undo:hover{background:rgba(52,209,126,.08);}
.tc-undo:focus-visible{outline:2px solid var(--green);outline-offset:2px;}

.tc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:14px;}
.tc-stat{background:var(--surface);border:1px solid var(--border);border-radius:15px;padding:14px 10px;text-align:center;}
.tc-stat-val{display:block;font-family:var(--font-display);font-weight:800;font-size:23px;letter-spacing:-.01em;font-variant-numeric:tabular-nums;}
.tc-stat-lab{display:block;margin-top:4px;font-size:10.5px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--dim);}

.tc-history{margin-top:26px;}
.tc-h2{font-family:var(--font-display);font-weight:700;font-size:12.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--dim);margin:0 2px 12px;}
.tc-empty{border:1px dashed var(--border);border-radius:16px;padding:22px 18px;text-align:center;}
.tc-empty-title{margin:0;font-weight:600;font-size:15px;}
.tc-empty-sub{margin:6px 0 0;color:var(--muted);font-size:13px;}
.tc-ladder{position:relative;padding-left:26px;}
.tc-ladder::before{content:"";position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:linear-gradient(180deg,var(--green-border),var(--border));}
.tc-rung{position:relative;display:flex;align-items:center;padding:11px 0;}
.tc-node{position:absolute;left:-23px;top:50%;transform:translateY(-50%);width:12px;height:12px;border-radius:999px;background:var(--green);box-shadow:0 0 0 3px var(--bg-top);}
.tc-rung-main{display:flex;align-items:center;justify-content:space-between;gap:12px;width:100%;}
.tc-rung-left{display:flex;align-items:baseline;}
.tc-rung-day{font-family:var(--font-display);font-weight:700;font-size:15.5px;}
.tc-rung-reps{color:var(--dim);font-size:13px;margin-left:8px;font-weight:500;}
.tc-chips{display:flex;gap:5px;}
.tc-chip{display:inline-grid;place-items:center;min-width:24px;height:22px;padding:0 6px;border-radius:7px;background:var(--green-tint);border:1px solid var(--green-border);color:var(--green);font-size:11px;font-weight:700;}

.tc-foot{margin-top:30px;text-align:center;}
.tc-reset{display:inline-flex;align-items:center;gap:7px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--font-body);font-size:13px;font-weight:500;padding:9px 14px;border-radius:11px;cursor:pointer;transition:border-color .18s,color .18s;}
.tc-reset:hover{border-color:var(--border-hi);color:var(--text);}
.tc-reset:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
.tc-confirm{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;}
.tc-confirm p{margin:0 0 12px;font-size:13.5px;color:var(--text);}
.tc-confirm-row{display:flex;gap:8px;justify-content:center;}
.tc-btn-danger{flex:1;max-width:160px;background:#C8553D;border:none;color:#fff;font-family:var(--font-body);font-weight:600;font-size:13.5px;padding:10px 14px;border-radius:11px;cursor:pointer;}
.tc-btn-danger:hover{background:#D5614A;}
.tc-btn-danger:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
.tc-btn-ghost{flex:1;max-width:120px;background:transparent;border:1px solid var(--border);color:var(--muted);font-family:var(--font-body);font-weight:500;font-size:13.5px;padding:10px 14px;border-radius:11px;cursor:pointer;}
.tc-btn-ghost:hover{color:var(--text);border-color:var(--border-hi);}
.tc-btn-ghost:focus-visible{outline:2px solid var(--amber);outline-offset:2px;}
.tc-note{margin:14px 0 0;font-size:11.5px;color:var(--dim);}

@keyframes tcRise{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:none;}}
@keyframes tcPop{0%{transform:scale(1);}45%{transform:scale(1.035);}100%{transform:scale(1);}}
@media (prefers-reduced-motion: reduce){
  *{animation:none !important;transition:none !important;}
  .tc-ex:active{transform:none;}
}
</style>
</head>
<body>
<div id="app"></div>
<script>
(function () {
  "use strict";

  var KEY = "stigen-challenge-v1";
  var EXERCISES = [
    { key: "pushups", name: "Push-ups", short: "P", icon: "dumbbell" },
    { key: "situps", name: "Sit-ups", short: "S", icon: "activity" },
    { key: "squats", name: "Knebøy", short: "K", icon: "person" }
  ];
  var EMPTY = { pushups: false, situps: false, squats: false };

  var ICONS = {
    trending: '<polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/>',
    dumbbell: '<path d="M6 7v10M3.5 9.5v5M18 7v10M20.5 9.5v5M6 12h12"/>',
    activity: '<polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/>',
    person: '<circle cx="12" cy="4.5" r="1.6"/><path d="M9.5 20l2.5-6 2.5 6M6.5 9l5.5 1.8L17.5 9M12 10.8V14"/>',
    check: '<polyline points="20 6 9 17 4 12"/>',
    trophy: '<path d="M8 21h8M12 17v4M6 4h12v4a6 6 0 0 1-12 0V4z"/><path d="M6 6H3.5v1.5A3.5 3.5 0 0 0 7 11M18 6h2.5v1.5A3.5 3.5 0 0 1 17 11"/>',
    reset: '<polyline points="2 5 2 11 8 11"/><path d="M3.2 15a9 9 0 1 0 2.2-9.4L2 11"/>'
  };
  function svg(name, size, sw) {
    return '<svg viewBox="0 0 24 24" width="' + size + '" height="' + size +
      '" fill="none" stroke="currentColor" stroke-width="' + (sw || 2.2) +
      '" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + ICONS[name] + '</svg>';
  }

  var state = { days: {} };
  try {
    var raw = localStorage.getItem(KEY);
    if (raw) { var p = JSON.parse(raw); if (p && p.days) state = p; }
  } catch (e) {}

  var celebrate = null;     // { day, ex } or null
  var confirmReset = false;
  var timer = null;

  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch (e) {} }
  function dayDone(o) { return !!(o && o.pushups && o.situps && o.squats); }
  function getDay(d) { return state.days[d] || EMPTY; }
  function currentDay() { var d = 1; while (dayDone(state.days[d])) d++; return d; }
  function totalReps() {
    var s = 0;
    for (var k in state.days) {
      if (!Object.prototype.hasOwnProperty.call(state.days, k)) continue;
      var v = state.days[k], n = +k;
      if (v.pushups) s += n; if (v.situps) s += n; if (v.squats) s += n;
    }
    return s;
  }
  function fmt(n) { try { return n.toLocaleString("nb-NO"); } catch (e) { return "" + n; } }
  function displayDay() { return celebrate ? celebrate.day : currentDay(); }
  function doneCountFor(d) {
    var o = getDay(d), c = 0;
    for (var i = 0; i < EXERCISES.length; i++) if (o[EXERCISES[i].key]) c++;
    return c;
  }

  var app = document.getElementById("app");

  var buttonsHtml = "";
  EXERCISES.forEach(function (e) {
    buttonsHtml +=
      '<button class="tc-ex" type="button" data-ex="' + e.key + '" aria-pressed="false">' +
        '<span class="tc-ex-left"><span class="tc-ex-icon">' + svg(e.icon, 20) + '</span>' +
        '<span class="tc-ex-name">' + e.name + '</span></span>' +
        '<span class="tc-ex-right"><span class="tc-ex-reps">1</span>' +
        '<span class="tc-ex-state">' + svg("check", 16, 3) + '</span></span>' +
      '</button>';
  });

  app.innerHTML =
    '<div class="tc-wrap">' +
      '<header class="tc-head">' +
        '<div class="tc-brand"><span class="tc-mark">' + svg("trending", 18, 2.5) + '</span>' +
        '<span class="tc-wordmark">Plus One</span></div>' +
        '<p class="tc-tag">Én rep mer for hver dag.</p>' +
      '</header>' +
      '<section class="tc-active" id="active" aria-live="polite">' +
        '<span class="tc-pill" id="pill">I dag</span>' +
        '<div class="tc-daylabel">Dag</div>' +
        '<div class="tc-daynum" id="daynum">1</div>' +
        '<p class="tc-daysub" id="daysub">1 reps av hver øvelse</p>' +
        '<div class="tc-progress" id="progress">0 / 3 fullført</div>' +
        '<div class="tc-buttons" id="buttons">' + buttonsHtml + '</div>' +
        '<div id="bannerHost"></div>' +
      '</section>' +
      '<div class="tc-stats">' +
        '<div class="tc-stat"><span class="tc-stat-val" id="statDays">0</span><span class="tc-stat-lab">Fullførte dager</span></div>' +
        '<div class="tc-stat"><span class="tc-stat-val" id="statToday">0</span><span class="tc-stat-lab">Reps i dag</span></div>' +
        '<div class="tc-stat"><span class="tc-stat-val" id="statTotal">0</span><span class="tc-stat-lab">Reps totalt</span></div>' +
      '</div>' +
      '<section class="tc-history"><h2 class="tc-h2">Tidligere dager</h2><div id="historyHost"></div></section>' +
      '<footer class="tc-foot"><div id="footerHost"></div>' +
      '<p class="tc-note">Fremgangen lagres på denne enheten.</p></footer>' +
    '</div>';

  var pill = document.getElementById("pill");
  var active = document.getElementById("active");
  var daynum = document.getElementById("daynum");
  var daysub = document.getElementById("daysub");
  var progress = document.getElementById("progress");
  var bannerHost = document.getElementById("bannerHost");
  var statDays = document.getElementById("statDays");
  var statToday = document.getElementById("statToday");
  var statTotal = document.getElementById("statTotal");
  var historyHost = document.getElementById("historyHost");
  var footerHost = document.getElementById("footerHost");

  var buttonEls = {};
  EXERCISES.forEach(function (e) {
    buttonEls[e.key] = document.querySelector('.tc-ex[data-ex="' + e.key + '"]');
    buttonEls[e.key].addEventListener("click", function () {
      if (celebrate) return; // locked briefly during the completion moment
      toggle(displayDay(), e.key);
    });
  });

  function renderActive() {
    var dd = displayDay();
    var obj = getDay(dd);
    var done = doneCountFor(dd);
    pill.textContent = celebrate ? "Fullført" : "I dag";
    active.classList.toggle("is-celebrating", !!celebrate);
    daynum.textContent = dd;
    daysub.textContent = dd + " reps av hver øvelse";
    progress.textContent = done + " / 3 fullført";
    progress.classList.toggle("done", done === 3);
    EXERCISES.forEach(function (e) {
      var btn = buttonEls[e.key];
      var isDone = !!obj[e.key];
      btn.classList.toggle("is-done", isDone);
      btn.setAttribute("aria-pressed", isDone ? "true" : "false");
      btn.setAttribute("aria-label", e.name + ", " + dd + " reps, " + (isDone ? "fullført" : "ikke fullført"));
      btn.querySelector(".tc-ex-reps").textContent = dd;
    });
    if (celebrate) {
      bannerHost.innerHTML =
        '<div class="tc-banner">' + svg("trophy", 20) +
        '<span class="tc-banner-txt"><strong>Dag ' + celebrate.day + ' fullført!</strong>' +
        '<span>Dag ' + (celebrate.day + 1) + ' er åpnet</span></span>' +
        '<button class="tc-undo" type="button" id="undoBtn">Angre</button></div>';
      document.getElementById("undoBtn").addEventListener("click", undo);
    } else {
      bannerHost.innerHTML = "";
    }
  }

  function renderStats() {
    var dd = displayDay();
    statDays.textContent = fmt(currentDay() - 1);
    statToday.textContent = fmt(doneCountFor(dd) * dd);
    statTotal.textContent = fmt(totalReps());
  }

  function renderHistory() {
    var dd = displayDay();
    if (dd - 1 < 1) {
      historyHost.innerHTML =
        '<div class="tc-empty"><p class="tc-empty-title">Ingen fullførte dager ennå</p>' +
        '<p class="tc-empty-sub">Trykk deg gjennom dag 1 for å åpne dag 2.</p></div>';
      return;
    }
    var chips = "";
    EXERCISES.forEach(function (e) { chips += '<span class="tc-chip">' + e.short + '</span>'; });
    var html = '<div class="tc-ladder" role="list">';
    for (var k = dd - 1; k >= 1; k--) {
      html +=
        '<div class="tc-rung" role="listitem" aria-label="Dag ' + k + ', fullført, ' + k + ' reps av hver øvelse">' +
          '<span class="tc-node"></span>' +
          '<div class="tc-rung-main"><span class="tc-rung-left">' +
          '<span class="tc-rung-day">Dag ' + k + '</span>' +
          '<span class="tc-rung-reps">' + k + ' reps</span></span>' +
          '<span class="tc-chips" aria-hidden="true">' + chips + '</span></div>' +
        '</div>';
    }
    html += '</div>';
    historyHost.innerHTML = html;
  }

  function renderFooter() {
    if (confirmReset) {
      footerHost.innerHTML =
        '<div class="tc-confirm"><p>Dette sletter all fremgang. Er du sikker?</p>' +
        '<div class="tc-confirm-row"><button class="tc-btn-danger" type="button" id="resetYes">Ja, nullstill</button>' +
        '<button class="tc-btn-ghost" type="button" id="resetNo">Avbryt</button></div></div>';
      document.getElementById("resetYes").addEventListener("click", resetAll);
      document.getElementById("resetNo").addEventListener("click", function () { confirmReset = false; renderFooter(); });
    } else {
      footerHost.innerHTML = '<button class="tc-reset" type="button" id="resetBtn">' + svg("reset", 14) + ' Nullstill utfordring</button>';
      document.getElementById("resetBtn").addEventListener("click", function () { confirmReset = true; renderFooter(); });
    }
  }

  function toggle(day, exKey) {
    var prevCurrent = currentDay();
    var cur = state.days[day] || EMPTY;
    var wasComplete = dayDone(cur);
    var updated = { pushups: cur.pushups, situps: cur.situps, squats: cur.squats };
    updated[exKey] = !updated[exKey];
    state.days[day] = updated;
    save();
    var willComplete = dayDone(updated);
    if (willComplete && !wasComplete && day === prevCurrent) {
      celebrate = { day: day, ex: exKey };
      if (timer) clearTimeout(timer);
      timer = setTimeout(function () {
        celebrate = null;
        renderActive(); renderStats(); renderHistory();
      }, 2200);
    }
    renderActive(); renderStats(); renderHistory();
  }

  function undo() {
    if (!celebrate) return;
    var day = celebrate.day, ex = celebrate.ex;
    var cur = state.days[day] || EMPTY;
    var updated = { pushups: cur.pushups, situps: cur.situps, squats: cur.squats };
    updated[ex] = false;
    state.days[day] = updated;
    save();
    if (timer) clearTimeout(timer);
    celebrate = null;
    renderActive(); renderStats(); renderHistory();
  }

  function resetAll() {
    state = { days: {} };
    save();
    confirmReset = false;
    celebrate = null;
    if (timer) clearTimeout(timer);
    renderActive(); renderStats(); renderHistory(); renderFooter();
  }

  renderActive();
  renderStats();
  renderHistory();
  renderFooter();

  if ("serviceWorker" in navigator) {
    window.addEventListener("load", function () {
      navigator.serviceWorker.register("./service-worker.js").catch(function () {});
    });
  }
})();
</script>
</body>
</html>
